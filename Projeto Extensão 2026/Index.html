<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Escolar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-left">
    <img src="imagens/imagem2.png" class="logo">

    <div class="titulo-escola">
      Escola Estadual <br>
      <strong>Professor Gonçalves Couto</strong>
    </div>
  </div>

  <input type="text" id="search" placeholder="🔍 Buscar livros...">

<main>

  <h2 class="titulo-pagina">📚 Acervo da Biblioteca</h2>

  <!-- CATEGORIAS -->
  <div class="categorias">
    <button onclick="filtrarCategoria('Todos')">Todos</button>
    <button onclick="filtrarCategoria('Romance')">Romance</button>
    <button onclick="filtrarCategoria('Realismo')">Realismo</button>

  <section id="livros" class="grid"></section>

</main>

<script src="script.js"></script>
</body>
</html>
