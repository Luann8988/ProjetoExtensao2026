<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Professor</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

  <!-- LOGIN -->
  <div id="loginContainer" class="login-container">

    <img src="Imagens/imagem3.png" class="logo" alt="Logo">
    <h2>Portal do Professor</h2>

    <!-- FORM -->
    <form onsubmit="login(event)">
      <input type="text" id="usuario" placeholder="Usuário" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>

  </div>

  <!-- PORTAL -->
  <div id="professorContainer" style="display:none;">

    <!-- HEADER -->
    <header>
      <div class="header-left">
        <img src="Imagens/imagem3.png" class="logo">

        <div class="titulo-escola">
          Escola Estadual <br>
          <strong>Professor Gonçalves Couto</strong>
        </div>
      </div>

      <input type="text" placeholder="🔍 Buscar...">
      <button onclick="logout()" class="btn-logout">Sair</button>
    </header>

    <!-- CONTEÚDO -->
    <main>

      <!-- MENU -->
      <aside class="sidebar">
        <h3>Dashboard</h3>
        <ul>
          <li class="active">📊 Estatísticas</li>
          <li>👥 Alunos</li>
          <li>📈 Relatórios</li>
          <li>📚 Livros</li>
        </ul>
      </aside>

      <!-- CONTEÚDO DIREITO -->
      <section class="dashboard-content">

        <!-- ESTATÍSTICAS -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">Total Empréstimos</div>
          </div>

          <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">Ativos</div>
          </div>

          <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">Atrasados</div>
          </div>

          <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">Devoluções</div>
          </div>
        </div>

        <!-- TABELA -->
        <div class="data-section">
          <div class="data-header">📋 Empréstimos Recentes</div>

          <table class="data-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Aluno</th>
                <th>Livro</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>001</td>
                <td>João</td>
                <td>Matemática</td>
                <td class="status-active">Ativo</td>
              </tr>
            </tbody>
          </table>
        </div>

      </section>
    </main>

  </div>

  <script src="Script.js"></script>
</body>
</html>
