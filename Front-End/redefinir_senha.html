<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Definir Nova Senha</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; background: #2b2b2b; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="box">
    <h2>Criar Nova Senha</h2>
    <p style="font-size: 14px; color: #aaa; margin-bottom: 20px;">Digite e confirme sua nova credencial de acesso.</p>
    
    <form id="formNovaSenha">
        <input type="password" id="novaSenha" placeholder="Nova Senha" required>
        <input type="password" id="confirmaSenha" placeholder="Confirme a Nova Senha" required>
        <button type="submit">Salvar Nova Senha</button>
    </form>
</div>

<script>
    // Recupera dinamicamente a chave ?token=... contida na URL do link
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    document.getElementById('formNovaSenha').addEventListener('submit', function(e) {
        e.preventDefault();

        const senha = document.getElementById('novaSenha').value;
        const confirma = document.getElementById('confirmaSenha').value;

        if (senha !== confirma) {
            alert('Atenção: As senhas digitadas não coincidem!');
            return;
        }

        if (!token) {
            alert('Erro: Chave de validação ausente ou corrompida.');
            return;
        }

        const formData = new FormData();
        formData.append('token', token);
        formData.append('nova_senha', senha);

        // Dispara a validação para o arquivo PHP correto na pasta 30_5
        fetch('../Back-End 30_5/atualizar_senha.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.ok) {
                alert('Excelente! Senha atualizada com sucesso. Vamos voltar para a tela de login.');
                window.location.href = 'Index.html'; 
            } else {
                alert('Erro na operação: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Erro:', error);
            alert('Não foi possível conectar ao servidor backend.');
        });
    });
</script>

</body>
</html>
